<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0f1419;
            --card:#1a2332;
            --muted:#7c8894;
            --accent:#3b82f6;
            --glass: rgba(255,255,255,0.04);
            --text-primary:#f0f4f8;
            --text-secondary:#cbd5e1;
        }
        html,body{height:100%;font-size:14px;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;font-weight:500}
        body{background:linear-gradient(180deg,var(--bg),#0a0e14);color:var(--text-primary);margin:0}
        .app-card{background:linear-gradient(135deg,var(--card),#141d2a);box-shadow:0 8px 24px rgba(0,0,0,0.8);border:1px solid rgba(59,130,246,0.1)}
        .muted{color:var(--muted)}
        .tab-btn{padding:10px 16px;font-size:13px;font-weight:600;border-radius:12px;background:transparent;color:var(--muted);border:1px solid transparent;transition:all 0.2s}
        .tab-btn:hover{color:var(--text-primary);background:rgba(59,130,246,0.1);transform:translateY(-2px)}
        .tab-btn.active{background:linear-gradient(135deg, rgba(59,130,246,0.25), rgba(59,130,246,0.1));color:#3b82f6;border-color:rgba(59,130,246,0.4);box-shadow:0 4px 12px rgba(59,130,246,0.15)}
        .coin{width:96px;height:96px;perspective:1000px}
        .coin-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1s}
        .coin-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:800;font-size:20px}
        .coin-front{background:linear-gradient(180deg,#fff,#f1f5f9);color:#0b1220}
        .coin-back{background:linear-gradient(180deg,#f8fafc,#e6eef8);color:#0b1220;transform:rotateY(180deg)}
        .coin.flipY .coin-inner{transform:rotateY(720deg)}

        /* responsive tweaks */
        .container{max-width:1200px;padding:16px;margin:0 auto}
        #onlineUsers{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
        .online-card{min-width:80px;width:80px;flex:0 0 auto}
        h1,h2,h3,h4,h5,h6{line-height:1.2;margin:12px 0;font-weight:700;color:var(--text-primary)}
        label{font-size:13px;font-weight:600;color:var(--text-secondary)}
        input,textarea,select{font-size:14px!important;background:#0a0e14;color:#ffffff;border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:8px 12px}
        input::placeholder{color:#7c8894}
        input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}

        .leaderboard-table-container{width:100%;overflow:hidden;margin-top:0.5rem;}
        .leaderboard-table-container::-webkit-scrollbar{display:none}
        .leaderboard-table-container{-ms-overflow-style:none;scrollbar-width:none}
        #leaderboardTable{width:100%;border-collapse:collapse;table-layout:fixed}
        #leaderboardTable th,#leaderboardTable td{padding:0.75rem 0.5rem;text-align:right;border-bottom:1px solid rgba(59,130,246,0.15);font-size:1.8rem;line-height:1.1;font-weight:600}
        #leaderboardTable th:first-child,#leaderboardTable td:first-child{text-align:left;}
        #leaderboardTable th{font-weight:700;color:var(--muted);letter-spacing:.02em;text-transform:uppercase;word-break:break-word}
        #leaderboardTable tbody tr:hover{background:rgba(59,130,246,0.08);}
        #leaderboardTable tfoot td{font-weight:700;border-top:2px solid rgba(59,130,246,0.2);color:var(--text-primary)}
        #leaderboardTable td{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        #leaderboardTable td:first-child{white-space:normal}
        @media (max-width: 720px){
            #leaderboardTable th,#leaderboardTable td{padding:0.5rem 0.2rem;font-size:0.85rem}
        }

        .table-ellipse{background:linear-gradient(180deg,#0f2c1f,#0a1f15);border:2px solid rgba(59,130,246,0.2);border-radius:9999px}
    </style>
</head>
<body class="min-h-screen">
    <!-- 登录/注册模态框 -->
    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="app-card rounded-lg p-6 w-96">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold" id="authTitle">登录</h2>
                <button onclick="toggleAuthModal('login')" class="text-gray-400 hover:text-gray-300">&times;</button>
            </div>
            <div id="authForm">
                <!-- 登录表单 -->
                <div id="loginForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">用户名</label>
                        <input type="text" id="loginUsername" class="w-full px-3 py-2 border rounded">
                    </div>
                    <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">登录</button>
                    <p class="mt-2 text-sm">没有账号？<a onclick="toggleAuthModal('register')" class="text-blue-500">注册</a></p>
                </div>
                
                <!-- 注册表单 -->
                <div id="registerForm" class="hidden">
                    <div class="mb-4">
                        <label class="block muted mb-2">用户名</label>
                        <input type="text" id="regUsername" class="w-full px-3 py-2 border rounded">
                    </div>
                    <div class="mb-4">
                            <label class="block muted mb-2">头像（请选择一个表情，唯一）</label>
                            <div id="avatarPicker" class="flex flex-wrap gap-2 p-2 border rounded bg-gray-100 max-h-40 overflow-y-auto"></div>
                            <input type="hidden" id="regAvatar" value="default_avatar.png">
                        </div>
                    <button onclick="register()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">注册</button>
                    <p class="mt-2 text-sm">已有账号？<a onclick="toggleAuthModal('login')" class="text-blue-500">登录</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" class="hidden container">
        <!-- Top bar -->
        <header class="flex items-center justify-between py-2 mb-3">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-gradient-to-br from-purple-600 to-indigo-500 text-white font-bold shadow-lg text-sm">R</div>
                <div>
                    <div class="text-base font-semibold">Accounting</div>
                    <div class="text-xs muted"></div>
                </div>
            </div>

            <div class="flex-1 mx-4 hidden md:block">
                <div class="w-full bg-[rgba(255,255,255,0.03)] rounded-lg py-1 px-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35"/></svg>
                    <input placeholder="Search players or sessions" class="w-full bg-transparent outline-none text-xs muted">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <div id="currentUserContainer" class="flex items-center gap-2">
                    <div id="currentAvatar" class="w-8 h-8 rounded-full flex items-center justify-center bg-[rgba(255,255,255,0.03)] text-xs"></div>
                    <div>
                        <div id="currentUser" class="text-xs font-medium"></div>
                        <div class="text-xs muted">online</div>
                    </div>
                    <button id="changeAvatarBtn" onclick="openAvatarModal()" class="text-xs px-2 py-1 rounded hidden">Change</button>
                </div>
                <button onclick="logout()" class="px-3 py-1 text-sm rounded bg-gradient-to-br from-red-500 to-pink-500 text-white shadow-sm">退出</button>
            </div>
        </header>

        <!-- Pill Tab导航 -->
        <nav class="mb-6">
            <div class="flex flex-wrap gap-2">
                <button onclick="switchTab('status')" class="tab-btn active">Status</button>
                <button onclick="switchTab('points')" class="tab-btn">Points</button>
                <button onclick="switchTab('leaderboard')" class="tab-btn">Leaderboard</button>
                <button onclick="switchTab('trends')" class="tab-btn">Trends</button>
                <button onclick="switchTab('seats')" class="tab-btn">Seats</button>
                <button onclick="switchTab('tournament')" class="tab-btn">Tournament</button>
                <button onclick="switchTab('random')" class="tab-btn">Random</button>
                <button id="adminTabBtn" onclick="switchTab('admin')" class="tab-btn hidden">Admin</button>
            </div>
        </nav>

        <!-- Tab内容 -->
        <div class="app-card rounded-lg p-6 min-h-[500px]">
            <!-- Status Tab -->
            <div id="statusTab" class="tab-content">
                <h2 class="text-base font-bold mb-3">在线用户</h2>
                <div id="onlineUsers" class="grid grid-cols-4 gap-3"></div>
                <h3 class="text-sm font-bold mt-4 mb-2">用户行为日志</h3>
                <div id="activityLog" class="border rounded p-2 h-48 overflow-y-auto text-xs"></div>
            </div>

            <!-- Points Tab -->
            <div id="pointsTab" class="tab-content hidden">
                <h2 class="text-base font-bold mb-3">记分管理</h2>
                    <div class="mb-3">
                        <label class="block muted mb-1 text-xs">选择用户</label>
                        <div id="pointsUserButtons" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="mb-3">
                        <label class="block muted mb-1 text-xs">Buy In / Cash Out</label>
                        <div class="flex gap-2">
                            <input type="number" id="pointsAmount" step="0.01" placeholder="金额" class="px-2 py-1 border rounded w-32 text-sm">
                            <button onclick="performPointsAction('buy_in')" class="bg-green-500 text-white px-3 py-1 text-sm rounded">Buy In</button>
                            <button onclick="performPointsAction('cash_out')" class="bg-red-500 text-white px-3 py-1 text-sm rounded">Cash Out</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="block muted mb-1 text-xs">Set Current</label>
                        <div class="flex gap-2">
                            <input type="number" id="setCurrentAmount" step="0.01" placeholder="金额" class="px-2 py-1 border rounded w-32 text-sm">
                            <button onclick="performPointsAction('set_current', true)" class="bg-blue-500 text-white px-3 py-1 text-sm rounded">Set Current</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="block muted mb-1 text-xs">Win / Loss</label>
                        <div class="flex gap-2 mb-2">
                            <input type="number" id="wlAmount" step="0.01" placeholder="金额" class="px-2 py-1 border rounded w-32 text-sm">
                            <div id="targetUserButtons" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="performWinLoss('win')" class="bg-green-600 text-white px-3 py-1 text-sm rounded">Win</button>
                            <button onclick="performWinLoss('loss')" class="bg-red-600 text-white px-3 py-1 text-sm rounded">Loss</button>
                        </div>
                    </div>

                <!-- 管理员控制面板 -->
                <div class="mb-3 hidden">
                        <label class="block muted mb-2">管理员控制</label>
                        <button onclick="createNewSession()" class="bg-green-500 text-white px-3 py-1 text-sm rounded hover:bg-green-600 mr-2">新建游戏会话</button>
                        <button onclick="refreshAllData()" class="bg-yellow-500 text-white px-3 py-1 text-sm rounded hover:bg-yellow-600 mr-2">刷新数据</button>
                        <button id="manageUsersBtn" onclick="openManageUsers()" class="bg-red-500 text-white px-3 py-1 text-sm rounded hover:bg-red-600 mr-2">管理用户</button>
                        <button onclick="resetAllData()" class="bg-red-700 text-white px-3 py-1 text-sm rounded hover:bg-red-800">⚠️ 清空所有数据</button>
                    </div>
            </div>

            <!-- Leaderboard Tab -->
            <div id="leaderboardTab" class="tab-content hidden">
                <h2 class="text-base font-bold mb-3">排行榜</h2>
                <div class="mb-3 flex flex-col sm:flex-row sm:items-center sm:gap-3">
                    <div class="flex gap-2">
                        <button onclick="loadLeaderboard()" class="bg-blue-500 text-white px-3 py-1 text-sm rounded hover:bg-blue-600">🔄 Refresh</button>
                        <button onclick="rebalanceScores()" class="bg-green-500 text-white px-3 py-1 text-sm rounded hover:bg-green-600">重新平衡</button>
                        <button onclick="revertRebalance()" class="bg-red-500 text-white px-3 py-1 text-sm rounded hover:bg-red-600">撤销平衡</button>
                    </div>
                    <span id="totalWinLoss" class="mt-2 sm:mt-0 font-bold text-sm"></span>
                </div>

                <div class="leaderboard-table-container">
                    <table id="leaderboardTable" class="app-card rounded-lg bg-[rgba(15,23,36,0.95)]">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Buy-in</th>
                                <th>Total</th>
                                <th>Win/Loss</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                        <tfoot>
                            <tr>
                                <td>Total</td>
                                <td id="totalBuyin">-</td>
                                <td id="totalCurrent">-</td>
                                <td id="totalWinLossValue">-</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- Trends Tab -->
            <div id="trendsTab" class="tab-content hidden">
                <h2 class="text-base font-bold mb-3">趋势图</h2>
                <div style="position:relative;width:100%;height:auto;min-height:300px">
                    <canvas id="trendsChart" style="max-height:600px"></canvas>
                </div>
            </div>

            <!-- Seats Tab -->
            <div id="seatsTab" class="tab-content hidden">
                <h2 class="text-base font-bold mb-3">座位分配</h2>
                <div class="mb-3 flex gap-2 items-center">
                    <button onclick="generateSeats()" id="generateSeatsBtn" class="bg-blue-500 text-white px-3 py-1 text-sm rounded hover:bg-blue-600 hidden">生成座位</button>
                    <button onclick="refreshSeats()" class="bg-gray-500 text-white px-3 py-1 text-sm rounded hover:bg-gray-600">刷新座位</button>
                    <button onclick="generateSeats()" id="redrawSeatsBtn" class="bg-purple-600 text-white px-3 py-1 text-sm rounded hidden">Redraw Seats</button>
                </div>

                <!-- Table container: moved down and responsive -->
                <div class="relative w-full flex justify-center items-center mt-12">
                    <!-- 椭圆桌子: width auto-fits, keeps 2:1 aspect ratio -->
                    <div id="tableEllipse" class="rounded-full table-ellipse relative" style="width: min(90vw, 600px); aspect-ratio: 2 / 1; padding-top:28px;">
                        <!-- 座位将动态生成 -->
                        <div id="seatsContainer" class="absolute inset-0 pointer-events-none"></div>
                    </div>
                </div>
            </div>

            <!-- Tournament Tab -->
            <div id="tournamentTab" class="tab-content hidden">
                <!-- Tournament Display Section -->
                <div class="mb-4 p-6 bg-gradient-to-b from-[rgba(139,92,246,0.2)] to-[rgba(59,130,246,0.2)] rounded-lg border border-[rgba(139,92,246,0.3)]">
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-2xl font-bold text-purple-300">Tournament</div>
                        <button id="tournamentEditBtn" onclick="toggleTournamentEditMode()" class="bg-blue-600 text-white px-4 py-2 text-sm font-bold rounded hover:bg-blue-700">✏️ Edit</button>
                    </div>
                    
                    <!-- Display Mode (Default) -->
                    <div id="tournamentDisplayMode" class="space-y-4">
                        <!-- Level & Time Control -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-[rgba(0,0,0,0.3)] p-4 rounded text-center">
                                <div class="text-xs muted mb-2">Level</div>
                                <div id="displayLevel" class="text-3xl font-bold text-blue-400">1</div>
                            </div>
                            <div class="bg-[rgba(0,0,0,0.3)] p-4 rounded text-center">
                                <div class="text-xs muted mb-2">Time</div>
                                <div id="displayTime" class="text-2xl font-bold text-orange-400">15:00</div>
                            </div>
                        </div>
                        
                        <!-- Countdown Display -->
                        <div class="bg-[rgba(0,0,0,0.5)] p-4 rounded text-center">
                            <div class="text-xs muted mb-2">Time Left</div>
                            <div id="levelCountdown" class="text-5xl font-bold text-green-400">00:00</div>
                        </div>
                        
                        <!-- Current Blinds Display -->
                        <div class="mb-2 p-3 bg-[rgba(0,0,0,0.2)] rounded text-center">
                            <label class="text-xs muted mb-2 block font-bold">Current Blinds</label>
                            <div id="displayCurrentBlinds" class="text-3xl font-bold text-yellow-300">1 | 2 (0)</div>
                        </div>

                        <!-- Next Blinds Display -->
                        <div class="p-3 bg-[rgba(0,0,0,0.2)] rounded text-center">
                            <label class="text-xs muted mb-2 block font-bold">Next Blinds</label>
                            <div id="displayNextBlinds" class="text-2xl font-bold text-gray-300">2 | 4 (0)</div>
                        </div>
                    </div>

                    <!-- Edit Mode -->
                    <div id="tournamentEditMode" class="space-y-4 hidden">
                        <!-- Level & Time Control -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-[rgba(0,0,0,0.3)] p-4 rounded">
                                <label class="text-xs muted mb-2 block">Level</label>
                                <input type="number" id="editLevel" min="1" value="1" class="w-full px-2 py-2 border rounded text-center text-lg font-bold">
                            </div>
                            <div class="bg-[rgba(0,0,0,0.3)] p-4 rounded">
                                <label class="text-xs muted mb-2 block">Time (分钟)</label>
                                <input type="number" id="editTime" min="1" value="15" class="w-full px-2 py-2 border rounded text-center text-lg font-bold">
                            </div>
                        </div>
                        
                        <!-- Current Blinds Edit -->
                        <div class="p-3 bg-[rgba(0,0,0,0.2)] rounded">
                            <label class="text-xs muted mb-2 block font-bold">Current Blinds</label>
                            <div class="grid grid-cols-3 gap-2">
                                <div>
                                    <label class="text-xs muted mb-1 block">SB</label>
                                    <input type="number" id="editCurrentSB" step="0.5" min="0" value="1" class="w-full px-2 py-2 border rounded text-center text-sm font-bold">
                                </div>
                                <div>
                                    <label class="text-xs muted mb-1 block">BB</label>
                                    <input type="number" id="editCurrentBB" step="0.5" min="0" value="2" class="w-full px-2 py-2 border rounded text-center text-sm font-bold">
                                </div>
                                <div>
                                    <label class="text-xs muted mb-1 block">Ante</label>
                                    <input type="number" id="editCurrentAnte" step="0.5" min="0" value="0" class="w-full px-2 py-2 border rounded text-center text-sm font-bold">
                                </div>
                            </div>
                        </div>

                        <!-- Next Blinds Edit -->
                        <div class="p-3 bg-[rgba(0,0,0,0.2)] rounded">
                            <label class="text-xs muted mb-2 block font-bold">Next Blinds</label>
                            <div class="grid grid-cols-3 gap-2">
                                <div>
                                    <label class="text-xs muted mb-1 block">SB</label>
                                    <input type="number" id="editNextSB" step="0.5" min="0" value="2" class="w-full px-2 py-2 border rounded text-center text-sm font-bold">
                                </div>
                                <div>
                                    <label class="text-xs muted mb-1 block">BB</label>
                                    <input type="number" id="editNextBB" step="0.5" min="0" value="4" class="w-full px-2 py-2 border rounded text-center text-sm font-bold">
                                </div>
                                <div>
                                    <label class="text-xs muted mb-1 block">Ante</label>
                                    <input type="number" id="editNextAnte" step="0.5" min="0" value="0" class="w-full px-2 py-2 border rounded text-center text-sm font-bold">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Control Buttons -->
                <div id="displayControlButtons" class="flex gap-2">
                    <button onclick="startTournamentTimer()" class="flex-1 bg-green-600 text-white px-3 py-3 text-sm font-bold rounded hover:bg-green-700">▶ Start</button>
                    <button onclick="pauseTournamentTimer()" class="flex-1 bg-yellow-600 text-white px-3 py-3 text-sm font-bold rounded hover:bg-yellow-700">⏸ Pause</button>
                    <button onclick="resetTournamentTimer()" class="flex-1 bg-red-600 text-white px-3 py-3 text-sm font-bold rounded hover:bg-red-700">⏹ Reset</button>
                </div>

                <div id="editControlButtons" class="flex gap-2 hidden mt-4">
                    <button onclick="saveTournamentChanges()" class="flex-1 bg-green-600 text-white px-3 py-3 text-sm font-bold rounded hover:bg-green-700">💾 Save</button>
                    <button onclick="cancelTournamentEdit()" class="flex-1 bg-gray-600 text-white px-3 py-3 text-sm font-bold rounded hover:bg-gray-700">✕ Cancel</button>
                </div>
            </div>

            <!-- Random Tab -->
            <div id="randomTab" class="tab-content hidden">
                <h2 class="text-lg font-bold mb-3">随机结果生成</h2>
                <div class="mb-3">
                    <label class="block muted mb-1 text-xs">Call的百分比 (%)</label>
                    <input type="number" id="yesPercentage" min="0" max="100" value="50" class="w-full px-2 py-1 border rounded mb-2 text-sm">
                    <button id="coinFlipBtn" onclick="coinFlip()" class="bg-purple-500 text-white px-3 py-1 text-sm rounded hover:bg-purple-600">开始随机</button>
                </div>
                <div id="coinFlipResult" class="mt-3 text-center text-xl font-bold min-h-[80px] flex justify-center items-center">
                    <!-- 硬币动画将在这里显示 -->
                    <div id="coin" class="coin hidden"></div>
                </div>
            </div>

            <!-- Admin Tab -->
            <div id="adminTab" class="tab-content hidden">
                <h2 class="text-lg font-bold mb-3">管理员面板</h2>
                
                <!-- User Management Section -->
                <div class="mb-4">
                    <h3 class="font-bold mb-2 text-sm">用户管理</h3>
                    <div id="adminUserList" class="space-y-2">
                        <!-- User management will be populated here -->
                    </div>
                </div>
                
                <!-- Admin Functions Section -->
                <div class="mb-4 p-3 bg-[rgba(255,255,255,0.04)] rounded">
                    <h3 class="font-bold mb-2 text-sm">系统操作</h3>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="createNewSession()" class="bg-green-500 text-white px-3 py-1 text-sm rounded hover:bg-green-600">新建游戏会话</button>
                        <button onclick="refreshAllData()" class="bg-yellow-500 text-white px-3 py-1 text-sm rounded hover:bg-yellow-600">刷新数据</button>
                        <button onclick="resetAllData()" class="bg-red-700 text-white px-3 py-1 text-sm rounded hover:bg-red-800">⚠️ 清空所有数据</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentUser = null;
        let websocket = null;
        let trendsChart = null;
        let originalScores = [];
        // stack of snapshots before each rebalance; pop to undo latest
        let rebalanceStack = [];

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            // Check for stored user session
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                try {
                    currentUser = JSON.parse(storedUser);
                    // Restore the session
                    document.getElementById('authModal').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('currentUser').textContent = `当前用户: ${currentUser.username}`;
                    // show avatar and change button
                    const av = document.getElementById('currentAvatar');
                    if (currentUser.avatar && currentUser.avatar.indexOf('.') > -1) {
                        av.innerHTML = `<img src="/static/${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover"/>`;
                    } else {
                        av.textContent = currentUser.avatar || '';
                    }
                    document.getElementById('changeAvatarBtn').classList.remove('hidden');
                    
                    // Show admin tab for peng
                    if (currentUser.is_admin || currentUser.username.toLowerCase() === 'peng') {
                        document.getElementById('adminTabBtn').classList.remove('hidden');
                    }
                    
                    // 初始化WebSocket
                    initWebSocket();
                    
                    // 加载所有数据
                    loadAllData();
                    
                    // 显示管理员控件
                    if (currentUser.is_admin || currentUser.username.toLowerCase() === 'peng') {
                        document.getElementById('generateSeatsBtn').classList.remove('hidden');
                        document.getElementById('adminTabBtn').classList.remove('hidden');
                    }
                    
                    // MJ用户也可以生成座位
                    if (currentUser.username.toLowerCase() === 'mj') {
                        document.getElementById('generateSeatsBtn').classList.remove('hidden');
                    }
                    return; // Skip showing auth modal
                } catch (e) {
                    // Invalid stored data, clear it
                    localStorage.removeItem('currentUser');
                }
            }
            
            // 默认显示登录模态框
            toggleAuthModal('login');
            
            // 监听操作类型变化（有防御性检查，避免元素不存在时报错）
            const pointsActionEl = document.getElementById('pointsAction');
            if (pointsActionEl) {
                pointsActionEl.addEventListener('change', () => {
                    const action = pointsActionEl.value;
                    const targetContainer = document.getElementById('targetUserContainer');
                    if (targetContainer) {
                        if (action === 'win' || action === 'loss') {
                            targetContainer.classList.remove('hidden');
                        } else {
                            targetContainer.classList.add('hidden');
                        }
                    }
                });
            }

            // ensure manage users button has a listener (defensive)
            const manageBtn = document.getElementById('manageUsersBtn');
            if (manageBtn) manageBtn.addEventListener('click', (e) => { try { openManageUsers(); } catch (err) { console.error('openManageUsers error', err); } });
        });

        // 切换认证表单
        function toggleAuthModal(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const authTitle = document.getElementById('authTitle');
            
            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                authTitle.textContent = '登录';
                // Clear register form
                document.getElementById('regUsername').value = '';
                document.getElementById('regAvatar').value = 'default_avatar.png';
                document.getElementById('avatarPicker').querySelectorAll('button').forEach(b => b.classList.remove('ring', 'ring-2', 'ring-blue-400'));
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                authTitle.textContent = '注册';
                // Clear login form
                document.getElementById('loginUsername').value = '';
                // 加载头像选择器（emoji 列表）
                loadAvatarPicker();
            }
        }

        // 登录
        async function login() {
            const username = document.getElementById('loginUsername').value;
            
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `username=${username}`
            });
            
            const data = await response.json();
            if (data.success) {
                currentUser = data.user;
                // Store user session in localStorage
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('currentUser').textContent = `当前用户: ${currentUser.username}`;
                    // show avatar and change button
                    const av = document.getElementById('currentAvatar');
                    if (currentUser.avatar && currentUser.avatar.indexOf('.') > -1) {
                        av.innerHTML = `<img src="/static/${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover"/>`;
                    } else {
                        av.textContent = currentUser.avatar || '';
                    }
                    document.getElementById('changeAvatarBtn').classList.remove('hidden');
                
                // 初始化WebSocket
                initWebSocket();
                
                // 加载所有数据
                loadAllData();
                
                // 显示管理员控件
                if (currentUser.is_admin || currentUser.username.toLowerCase() === 'peng') {
                    document.getElementById('adminTabBtn').classList.remove('hidden');
                    document.getElementById('generateSeatsBtn').classList.remove('hidden');
                }
                
                // MJ用户也可以生成座位
                if (currentUser.username.toLowerCase() === 'mj') {
                    document.getElementById('generateSeatsBtn').classList.remove('hidden');
                }
            } else {
                alert(data.message);
            }
        }

        // 注册
        async function register() {
            const username = document.getElementById('regUsername').value;
            const avatar = document.getElementById('regAvatar').value;
            
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            if (!avatar || avatar === 'default_avatar.png') {
                alert('请选择一个头像');
                return;
            }
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, avatar })
            });
            
            const data = await response.json();
            if (data.success) {
                alert('注册成功，请登录');
                toggleAuthModal('login');
            } else {
                alert(data.message);
            }
        }

        // 加载头像选择器数据并渲染
        async function loadAvatarPicker() {
            try {
                const resp = await fetch('/api/avatars');
                const data = await resp.json();
                const picker = document.getElementById('avatarPicker');
                if (!picker) return;
                picker.innerHTML = '';
                const taken = new Set(data.taken || []);
                (data.all || []).forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'w-10 h-10 text-2xl flex items-center justify-center rounded';
                    btn.textContent = emoji;
                    if (taken.has(emoji)) {
                        btn.classList.add('opacity-40', 'cursor-not-allowed');
                        btn.disabled = true;
                    }
                    btn.addEventListener('click', () => {
                        if (btn.disabled) return;
                        document.getElementById('regAvatar').value = emoji;
                        // Highligh selected
                        picker.querySelectorAll('button').forEach(b => b.classList.remove('ring', 'ring-2', 'ring-blue-400'));
                        btn.classList.add('ring', 'ring-2', 'ring-blue-400');
                    });
                    picker.appendChild(btn);
                });
            } catch (e) {
                console.error('加载头像列表失败', e);
            }
        }

        // 退出登录
        function logout() {
            if (websocket) {
                websocket.close();
            }
            currentUser = null;
            // Clear stored session
            localStorage.removeItem('currentUser');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authModal').classList.remove('hidden');
            toggleAuthModal('login');
        }

        // 初始化WebSocket
        function initWebSocket() {
            if (websocket) {
                websocket.close();
            }
            
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            websocket = new WebSocket(`${wsProtocol}//${window.location.host}/ws/${currentUser.username}`);
            
            websocket.onopen = () => {
                console.log('WebSocket连接成功');
            };
            
            websocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            websocket.onclose = () => {
                console.log('WebSocket连接关闭');
                // 自动重连
                setTimeout(initWebSocket, 3000);
            };
            
            websocket.onerror = (error) => {
                console.error('WebSocket错误:', error);
            };
        }

        // 处理WebSocket消息
        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'user_status':
                    // update online user list; fall back to reloading full list
                    try { updateOnlineUsers(data.online_users); } catch (e) { loadOnlineUsers(); }
                    addActivityLog(`${data.username} ${data.action === 'online' ? '上线' : '下线'}`);
                    break;
                case 'score_update':
                    addActivityLog(`${data.username} 执行了${data.action}操作，金额: ${data.amount}`);
                    loadLeaderboard();
                    break;
                case 'rebalance':
                    addActivityLog(data.message);
                    loadLeaderboard();
                    break;
                case 'seats_update':
                    renderSeats(data.seats, data.mirror);
                    break;
                case 'coin_flip':
                    showCoinFlipResult(data.result);
                    break;
                case 'user_message':
                    addActivityLog(`${data.username}: ${data.message}`);
                    break;
            }
        }

        // Update online users from websocket payload (or fallback to reload)
        function updateOnlineUsers(usernames) {
            // if we have a list of usernames, reload the full user info
            // because avatar data is provided by /api/users
            loadOnlineUsers();
        }

        // 切换Tab
        function switchTab(tabName) {
            // 隐藏所有Tab
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });

            // 更新tab按钮样式
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.trim().toLowerCase() === tabName.toLowerCase());
            if (btn) btn.classList.add('active');

            // 显示选中的Tab
            const tab = document.getElementById(`${tabName}Tab`);
            if (tab) tab.classList.remove('hidden');

            // 加载Tab数据
            if (tabName === 'status') loadOnlineUsers();
            if (tabName === 'points') loadUsersForPoints();
            if (tabName === 'leaderboard') loadLeaderboard();
            if (tabName === 'trends') loadTrends();
            if (tabName === 'seats') refreshSeats();
            if (tabName === 'tournament') loadTournamentData();
            if (tabName === 'admin') loadAdminUserList();
        }

        // Load current tournament blind data into edit fields
        function loadTournamentData() {
            if (tournamentData.blinds && tournamentData.blinds.length > tournamentState.currentLevel) {
                const currentBlind = tournamentData.blinds[tournamentState.currentLevel];
                document.getElementById('editCurrentSB').value = currentBlind.small_blind || 0;
                document.getElementById('editCurrentBB').value = currentBlind.big_blind || 0;
                document.getElementById('editCurrentAnte').value = currentBlind.ante || 0;
            }
        }

        // 加载所有用户用于Points选择（仅用于选择目标，actor 始终为当前用户）
        let selectedTargetUser = null;
        function resetPointsInputs() {
            document.getElementById('pointsAmount').value = '';
            document.getElementById('setCurrentAmount').value = '';
            document.getElementById('wlAmount').value = '';
            selectedTargetUser = null;
            document.querySelectorAll('#targetUserButtons button').forEach(b => b.classList.remove('ring', 'ring-2', 'ring-blue-400'));
        }

        async function loadUsersForPoints() {
            const response = await fetch('/api/users');
            const data = await response.json();

            const pointsContainer = document.getElementById('pointsUserButtons');
            const targetContainer = document.getElementById('targetUserButtons');
            pointsContainer.innerHTML = '';
            targetContainer.innerHTML = '';

            // actor is always current user
            const actorDiv = document.createElement('div');
            actorDiv.className = 'px-3 py-1 rounded bg-gray-800 text-white';
            actorDiv.textContent = currentUser ? currentUser.username : '未登录';
            pointsContainer.appendChild(actorDiv);

            // populate targets for win/loss
            data.users.forEach(user => {
                if (currentUser && user.username === currentUser.username) return; // skip self for target list
                const tbtn = document.createElement('button');
                tbtn.type = 'button';
                tbtn.className = 'px-2 py-1 rounded bg-gray-700 text-white';
                tbtn.textContent = user.username;
                tbtn.addEventListener('click', () => {
                    selectedTargetUser = user.username;
                    document.querySelectorAll('#targetUserButtons button').forEach(b => b.classList.remove('ring', 'ring-2', 'ring-blue-400'));
                    tbtn.classList.add('ring', 'ring-2', 'ring-blue-400');
                });
                targetContainer.appendChild(tbtn);
            });

            // reset inputs
            resetPointsInputs();
        }

        // 更新在线用户列表
        async function loadOnlineUsers() {
            // 实际应用中应该从WebSocket获取，这里先从API获取所有用户
            const response = await fetch('/api/users');
            const data = await response.json();
            
            const onlineUsersContainer = document.getElementById('onlineUsers');
            onlineUsersContainer.innerHTML = '';
            
            data.users.forEach(user => {
                const userCard = document.createElement('div');
                userCard.className = 'online-card app-card rounded-lg p-3 text-center';
                const avatar = user.avatar || 'default_avatar.png';
                // 如果 avatar 看起来像文件名则显示图片，否则显示 emoji
                if (typeof avatar === 'string' && avatar.indexOf('.') > -1) {
                    userCard.innerHTML = `
                        <img src="/static/${avatar}" class="w-14 h-14 rounded-full mx-auto mb-2 object-cover" />
                        <p class="text-sm">${user.username}</p>
                    `;
                } else {
                    userCard.innerHTML = `
                        <div class="w-14 h-14 rounded-full mx-auto mb-2 flex items-center justify-center text-2xl">${avatar}</div>
                        <p class="text-sm">${user.username}</p>
                    `;
                }
                onlineUsersContainer.appendChild(userCard);
            });
        }

        // 添加活动日志
        function addActivityLog(message) {
            const logContainer = document.getElementById('activityLog');
            const logEntry = document.createElement('div');
            logEntry.className = 'mb-1 text-sm';
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(logEntry);
            // 滚动到底部
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 更新记分
        async function updateScore() {
            const username = document.getElementById('pointsUser').value;
            const action = document.getElementById('pointsAction').value;
            const amount = parseFloat(document.getElementById('pointsAmount').value);
            const targetUser = document.getElementById('targetUser').value;
            
            if (!amount || isNaN(amount)) {
                alert('请输入有效的金额');
                return;
            }
            
            const response = await fetch('/api/update_score', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username,
                    action,
                    amount,
                    target_user: (action === 'win' || action === 'loss') ? targetUser : null
                })
            });
            
            const data = await response.json();
            if (data.success) {
                addActivityLog(`成功更新${username}的记分: ${action} ${amount}`);
                loadLeaderboard();
            } else {
                alert(data.message);
            }
        }

        // Perform simple points actions (buy_in, cash_out, set_current) as current user
        async function performPointsAction(action, isSetCurrent = false) {
            if (!currentUser) { alert('请先登录'); return; }
            const username = currentUser.username;
            let amount = 0;
            if (action === 'set_current' || isSetCurrent) {
                amount = parseFloat(document.getElementById('setCurrentAmount').value);
            } else {
                amount = parseFloat(document.getElementById('pointsAmount').value);
            }
            if (isNaN(amount)) { alert('请输入有效金额'); return; }

            const response = await fetch('/api/update_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, action, amount })
            });
            const data = await response.json();
            if (data.success) {
                addActivityLog(`成功更新${username}的记分: ${action} ${amount}`);
                // clear the input that was used
                try {
                    if (action === 'set_current' || isSetCurrent) document.getElementById('setCurrentAmount').value = '';
                    else document.getElementById('pointsAmount').value = '';
                } catch (e) {}
                loadLeaderboard();
            } else {
                alert(data.message || '操作失败');
            }
        }

        // Perform win/loss with selected target user
        async function performWinLoss(kind) {
            if (!currentUser) { alert('请先登录'); return; }
            if (!selectedTargetUser) { alert('请选择目标用户'); return; }
            const amount = parseFloat(document.getElementById('wlAmount').value);
            if (isNaN(amount)) { alert('请输入有效金额'); return; }
            const response = await fetch('/api/update_score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser.username, action: kind, amount, target_user: selectedTargetUser })
            });
            const data = await response.json();
            if (data.success) {
                addActivityLog(`成功记录${kind} ${amount} 对 ${selectedTargetUser}`);
                // clear wl input
                try { document.getElementById('wlAmount').value = ''; } catch (e) {}
                loadLeaderboard();
            } else {
                alert(data.message || '操作失败');
            }
        }

        // 加载排行榜（桌面表格 + 移动卡片）
        async function loadLeaderboard() {
            const response = await fetch('/api/scores');
            const data = await response.json();

            // 保存原始数据用于撤销平衡
            if (originalScores.length === 0) {
                originalScores = JSON.parse(JSON.stringify(data.scores));
            }

            // 更新总赢亏显示：正数表示需要让赢家少赢，负数表示可以让输家少输
            const msg = data.total_win_loss < 0 ? `可以让输家少输 ${Math.abs(data.total_win_loss).toFixed(2)}` : `需要让赢家少赢 ${Math.abs(data.total_win_loss).toFixed(2)}`;
            document.getElementById('totalWinLoss').textContent = `总赢亏: ${data.total_win_loss.toFixed(2)} (${msg})`;

            const leaderboardTable = document.getElementById('leaderboardTable');
            if (leaderboardTable) {
                const tbody = leaderboardTable.querySelector('tbody');
                const tfoot = leaderboardTable.querySelector('tfoot');
                tbody.innerHTML = '';

                let totals = { current: 0, brought: 0, win_loss: 0 };
                data.scores.forEach((score, idx) => {
                    totals.current += parseFloat(score.current || 0);
                    totals.brought += parseFloat(score.brought || 0);
                    totals.win_loss += parseFloat(score.win_loss || 0);

                    const winLossClass = score.win_loss >= 0 ? 'text-green-400' : 'text-red-400';
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="font-semibold">${score.player}</td>
                        <td>${score.brought.toFixed(2)}</td>
                        <td>${score.current.toFixed(2)}</td>
                        <td class="${winLossClass}">${score.win_loss.toFixed(2)}</td>
                    `;
                    tbody.appendChild(row);
                });

                if (tfoot) {
                    const totalBuyin = tfoot.querySelector('#totalBuyin');
                    const totalCurrent = tfoot.querySelector('#totalCurrent');
                    const totalWinLoss = tfoot.querySelector('#totalWinLossValue');

                    if (totalBuyin) totalBuyin.textContent = totals.brought.toFixed(2);
                    if (totalCurrent) totalCurrent.textContent = totals.current.toFixed(2);
                    if (totalWinLoss) {
                        totalWinLoss.textContent = totals.win_loss.toFixed(2);
                        totalWinLoss.className = totals.win_loss >= 0 ? 'text-green-400' : 'text-red-400';
                    }
                }
            }
        }

        // 重新平衡记分
        async function rebalanceScores() {
            const count = prompt('请输入需要调整的玩家数量:', '1');
            if (!count || isNaN(count) || count < 1) {
                alert('请输入有效的数量');
                return;
            }
            // snapshot current scores so we can undo this specific rebalance
            try {
                const snapResp = await fetch('/api/scores');
                const snapData = await snapResp.json();
                if (snapData && snapData.scores) {
                    rebalanceStack.push(JSON.parse(JSON.stringify(snapData.scores)));
                }
            } catch (e) {
                console.error('failed to snapshot scores before rebalance', e);
            }

            const response = await fetch('/api/rebalance', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ count: parseInt(count) })
            });
            
            const data = await response.json();
            if (data.success) {
                alert(data.message);
                loadLeaderboard();
            } else {
                alert(data.message);
            }
        }

        // 撤销平衡
        function revertRebalance() {
            if (!rebalanceStack || rebalanceStack.length === 0) {
                alert('没有可撤销的平衡操作');
                return;
            }
            if (confirm('确定要撤销最近一次平衡操作吗？')) {
                const lastSnapshot = rebalanceStack.pop();
                // restore 'current' values from the snapshot
                lastSnapshot.forEach(score => {
                    try {
                        updateScoreManually(score.player, 'set_current', score.current);
                    } catch (e) {
                        console.error('restore score failed', e);
                    }
                });
                loadLeaderboard();
                addActivityLog('已撤销最近一次平衡操作');
            }
        }

        // 手动更新记分（用于撤销平衡）
        async function updateScoreManually(username, action, amount) {
            await fetch('/api/update_score', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username,
                    action,
                    amount
                })
            });
        }

                        </div>
                        <div>

        // 加载趋势图 — 每个玩家一条折线，x轴为时间，y轴为金额（current）
        async function loadTrends() {
            const resp = await fetch('/api/trends');
            const data = await resp.json();
            const ctx = document.getElementById('trendsChart').getContext('2d');

            if (trendsChart) trendsChart.destroy();

            const trends = data.trends || {};

            // 收集所有时间戳并排序
            const allTimestamps = new Set();
            Object.values(trends).forEach(arr => arr.forEach(r => allTimestamps.add(r.timestamp)));
            const sortedTimestamps = Array.from(allTimestamps).sort((a, b) => new Date(a) - new Date(b));
            
            // 使用索引作为x轴标签，而不是时间戳
            const labels = sortedTimestamps.map((_, i) => String(i + 1));

            // 生成每个用户的数据集
            const userNames = Object.keys(trends);
            const datasets = userNames.map((uname, i) => {
                const map = {};
                // use win_loss for trends
                trends[uname].forEach(r => { map[r.timestamp] = r.win_loss; });
                // forward-fill missing values (视为水平无变化)
                const dataPoints = [];
                let prev = null;
                for (const ts of sortedTimestamps) {
                    if (map[ts] !== undefined) {
                        prev = map[ts];
                        dataPoints.push(map[ts]);
                    } else {
                        dataPoints.push(prev !== null ? prev : 0);
                    }
                }
                const hue = Math.round((i * 360) / Math.max(1, userNames.length));
                const color = `hsl(${hue} 80% 60%)`;
                const bg = `hsla(${hue}, 90%, 50%, 0.12)`;
                return {
                    label: uname,
                    data: dataPoints,
                    borderColor: color,
                    backgroundColor: bg,
                    tension: 0.3,
                    spanGaps: true,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    pointBackgroundColor: dataPoints.map(v => v == null ? 'transparent' : color),
                    borderWidth: 2.5
                };
            });

            const container = document.getElementById('trendsChart').parentElement;
            const chartHeight = Math.max(300, Math.min(600, 100 + userNames.length * 40));
            container.style.height = chartHeight + 'px';

            trendsChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            display: true, 
                            labels: { color: '#cbd5e1', font: { size: 12, weight: '600' }, padding: 12 },
                            position: 'bottom'
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleColor: '#fff',
                            bodyColor: '#cbd5e1',
                            borderColor: 'rgba(59,130,246,0.5)',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: true
                        }
                    },
                    scales: {
                        x: { 
                            ticks: { color: '#7c8894', font: { size: 11 } },
                            grid: { color: 'rgba(59,130,246,0.05)', drawBorder: false }
                        },
                        y: { 
                            ticks: { color: '#7c8894', font: { size: 11 } }, 
                            beginAtZero: true,
                            grid: { color: 'rgba(59,130,246,0.08)', drawBorder: false }
                        }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }

        // 渲染座位 — 均匀分布在椭圆周上，显示头像与用户名
        async function renderSeats(seats, mirrorFlag) {
            const container = document.getElementById('seatsContainer');
            container.innerHTML = '';

            // 获取用户头像映射
            const usersResp = await fetch('/api/users');
            const usersData = await usersResp.json();
            const avatarMap = {};
            usersData.users.forEach(u => avatarMap[u.username] = u.avatar || 'default_avatar.png');

                const rect = container.getBoundingClientRect();
                const cx = rect.width / 2;
                const cy = rect.height / 2;
                const rx = rect.width * 0.42; // ellipse radii
                const ry = rect.height * 0.42;

            // place seats evenly around the ellipse and push them outside the table edge
            const outwardBase = Math.max(rx, ry) * 0.28; // proportionally push seats outward
            const mirror = !!mirrorFlag;
            const tableEl = document.getElementById('tableEllipse');
            if (tableEl) {
                tableEl.style.transform = mirror ? 'rotate(180deg)' : 'none';
            }

            seats.forEach((seat, i) => {
                const angle = (seat.angle !== undefined && seat.angle !== null) ? seat.angle : ((2 * Math.PI * i) / seats.length - Math.PI / 2); // prefer server-provided angle
                // point on ellipse edge
                const ex = cx + rx * Math.cos(angle);
                const ey = cy + ry * Math.sin(angle);
                // push outward along radial direction so people sit outside the table
                const outward = outwardBase;
                const ox = Math.cos(angle) * outward;
                const oy = Math.sin(angle) * outward;
                const x = ex + ox;
                const y = ey + oy;

                const seatElement = document.createElement('div');
                // minimal container — no circular card background so table image stays visible
                // responsive sizes: smaller on narrow screens
                seatElement.className = 'absolute w-16 h-16 sm:w-20 sm:h-20 flex flex-col justify-center items-center text-xs text-center p-0';
                seatElement.style.left = `${x}px`;
                seatElement.style.top = `${y}px`;
                // if the table is rotated, counter-rotate each seat so avatar/name remain upright
                seatElement.style.transform = mirror ? 'translate(-50%, -50%) rotate(180deg)' : 'translate(-50%, -50%)';

                // seat number badge
                const badge = document.createElement('div');
                badge.className = 'absolute -top-2 -right-2 text-[10px] px-1 py-0.5 rounded bg-[rgba(0,0,0,0.5)] text-white';
                badge.textContent = `#${seat.seat}`;
                seatElement.appendChild(badge);

                const avatarVal = seat.username ? (avatarMap[seat.username] || 'default_avatar.png') : null;
                if (avatarVal && typeof avatarVal === 'string' && avatarVal.indexOf('.') > -1) {
                    const img = document.createElement('img');
                    img.src = `/static/${avatarVal}`;
                    img.className = 'w-10 h-10 rounded-full mb-1 object-cover';
                    seatElement.appendChild(img);
                    const name = document.createElement('div');
                    name.className = 'truncate w-20 text-xs';
                    name.textContent = seat.username;
                    seatElement.appendChild(name);
                } else if (avatarVal) {
                    const emojiSpan = document.createElement('div');
                    emojiSpan.className = 'mb-1 text-xl';
                    emojiSpan.textContent = avatarVal;
                    seatElement.appendChild(emojiSpan);
                    const name = document.createElement('div');
                    name.className = 'truncate w-20 text-xs';
                    name.textContent = seat.username;
                    seatElement.appendChild(name);
                } else {
                    // empty seat — show small seat number label only (no circular placeholder)
                    const emptyLabel = document.createElement('div');
                    emptyLabel.className = 'text-xs muted';
                    emptyLabel.textContent = `Seat ${seat.seat}`;
                    seatElement.appendChild(emptyLabel);
                }
                container.appendChild(seatElement);
            });

            // Redraw button visibility for peng/mj
            const redraw = document.getElementById('redrawSeatsBtn');
            if (currentUser && (currentUser.username.toLowerCase() === 'peng' || currentUser.username.toLowerCase() === 'mj')) {
                redraw.classList.remove('hidden');
            } else {
                redraw.classList.add('hidden');
            }
        }

        // 硬币翻转（有动画）
        async function coinFlip() {
            const percentage = parseFloat(document.getElementById('yesPercentage').value);

            if (isNaN(percentage) || percentage < 0 || percentage > 100) {
                alert('请输入0-100之间的有效百分比');
                return;
            }

            const btn = document.getElementById('coinFlipBtn');
            if (btn) { btn.disabled = true; btn.classList.add('opacity-60', 'cursor-not-allowed'); }

            const resultContainer = document.getElementById('coinFlipResult');
            resultContainer.innerHTML = '';

            // 创建硬币DOM：两面
            const coin = document.createElement('div');
            coin.className = 'coin';
            const inner = document.createElement('div');
            inner.className = 'coin-inner';
            const front = document.createElement('div');
            front.className = 'coin-face coin-front';
            front.textContent = 'CALL';
            const back = document.createElement('div');
            back.className = 'coin-face coin-back';
            back.textContent = 'FOLD';
            inner.appendChild(front);
            inner.appendChild(back);
            coin.appendChild(inner);
            resultContainer.appendChild(coin);

            // start server request but don't await yet
            const respPromise = fetch('/api/coin_flip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `percentage=${percentage}`
            }).then(r => r.json()).catch(e => ({ success: false, result: 'no' }));

            // animate 1 flip
            const sleep = ms => new Promise(res => setTimeout(res, ms));
            for (let k = 0; k < 1; k++) {
                inner.style.transition = 'transform 450ms ease-in-out';
                // rotate 720deg per iteration to get a clear flipping motion
                inner.style.transform = `rotateY(${720 * (k + 1)}deg)`;
                await sleep(500);
            }

            // await server result
            const data = await respPromise;
            const result = data && data.result ? data.result : 'no';

            // finalize coin to show final face
            inner.style.transition = 'transform 300ms ease-in-out';
            inner.style.transform = result === 'yes' ? 'rotateY(0deg)' : 'rotateY(180deg)';

            // re-enable button
            if (btn) { btn.disabled = false; btn.classList.remove('opacity-60', 'cursor-not-allowed'); }

            // log result (map to human-friendly labels)
            const display = result === 'yes' ? 'Call' : 'Fold';
            addActivityLog(`随机结果: ${display} (概率: ${document.getElementById('yesPercentage').value}%)`);
        }

        // 显示硬币翻转结果（让硬币停在相应一面，保留动画）
        function showCoinFlipResult(result) {
            const resultContainer = document.getElementById('coinFlipResult');
            // If an animated coin already exists (created by coinFlip), finalize it
            const existingCoin = resultContainer.querySelector('.coin');
            if (existingCoin) {
                const inner = existingCoin.querySelector('.coin-inner');
                if (inner) {
                    // stop the flip animation and set final face
                    existingCoin.classList.remove('flipY');
                    inner.style.transition = 'transform 300ms';
                    if (result === 'yes') {
                        inner.style.transform = 'rotateY(0deg)';
                    } else {
                        inner.style.transform = 'rotateY(180deg)';
                    }
                }
            } else {
                // no existing coin (e.g., if called directly) — render a static coin
                resultContainer.innerHTML = '';
                const coin = document.createElement('div');
                coin.className = 'coin';
                const inner = document.createElement('div');
                inner.className = 'coin-inner';
                const front = document.createElement('div');
                front.className = 'coin-face coin-front';
                front.textContent = 'CALL';
                const back = document.createElement('div');
                back.className = 'coin-face coin-back';
                back.textContent = 'FOLD';
                inner.appendChild(front);
                inner.appendChild(back);
                inner.style.transform = result === 'yes' ? 'rotateY(0deg)' : 'rotateY(180deg)';
                coin.appendChild(inner);
                resultContainer.appendChild(coin);
            }

            // log the result in activity log (no textual display in UI)
            const display = result === 'yes' ? 'Call' : 'Fold';
            addActivityLog(`随机结果: ${display} (概率: ${document.getElementById('yesPercentage').value}%)`);
        }

        // Save Tournament Changes
        function saveTournamentChanges() {
            const level = parseInt(document.getElementById('editLevel').value);
            const time = parseInt(document.getElementById('editTime').value);
            const currentSB = parseFloat(document.getElementById('editCurrentSB').value);
            const currentBB = parseFloat(document.getElementById('editCurrentBB').value);
            const currentAnte = parseFloat(document.getElementById('editCurrentAnte').value) || 0;
            const nextSB = parseFloat(document.getElementById('editNextSB').value);
            const nextBB = parseFloat(document.getElementById('editNextBB').value);
            const nextAnte = parseFloat(document.getElementById('editNextAnte').value) || 0;

            // Validation
            if (isNaN(level) || level < 1) {
                alert('Please enter valid level');
                return;
            }
            if (isNaN(time) || time < 1) {
                alert('Please enter valid time');
                return;
            }
            if (isNaN(currentSB) || isNaN(currentBB) || currentSB < 0 || currentBB < 0) {
                alert('Please enter valid current blinds');
                return;
            }
            if (isNaN(nextSB) || isNaN(nextBB) || nextSB < 0 || nextBB < 0) {
                alert('Please enter valid next blinds');
                return;
            }

            // Update state
            tournamentState.currentLevel = level;
            tournamentState.levelTime = time;
            tournamentState.currentSB = currentSB;
            tournamentState.currentBB = currentBB;
            tournamentState.currentAnte = currentAnte;
            tournamentState.nextSB = nextSB;
            tournamentState.nextBB = nextBB;
            tournamentState.nextAnte = nextAnte;
            tournamentState.timeRemaining = time * 60;

            // Exit edit mode
            editMode = false;
            const displayMode = document.getElementById('tournamentDisplayMode');
            const editModeDiv = document.getElementById('tournamentEditMode');
            const editBtn = document.getElementById('tournamentEditBtn');
            const displayBtns = document.getElementById('displayControlButtons');
            const editBtns = document.getElementById('editControlButtons');

            displayMode.classList.remove('hidden');
            displayBtns.classList.remove('hidden');
            editBtns.classList.add('hidden');
            editBtn.textContent = '✏️ Edit';

            updateTournamentDisplay();
            addActivityLog(`Tournament settings saved: Level ${level}, ${time}min, ${currentSB}|${currentBB}(${currentAnte}) → ${nextSB}|${nextBB}(${nextAnte})`);
        }
