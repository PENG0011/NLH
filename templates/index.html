            document.getElementById('displayTime').textContent = `${String(Math.floor(tournamentState.levelTime / 60)).padStart(2, '0')}:${String(tournamentState.levelTime % 60).padStart(2, '0')}`;
            document.getElementById('displayCurrentBlinds').textContent = `${tournamentState.currentSB} | ${tournamentState.currentBB} (${tournamentState.currentAnte})`;
            document.getElementById('displayNextBlinds').textContent = `${tournamentState.nextSB} | ${tournamentState.nextBB} (${tournamentState.nextAnte})`;
            
            // Initialize countdown if not already
            if (tournamentState.timeRemaining === 0) {
                tournamentState.timeRemaining = tournamentState.levelTime * 60;
            }
            
            const mins = Math.floor(tournamentState.timeRemaining / 60);
            const secs = tournamentState.timeRemaining % 60;
            document.getElementById('levelCountdown').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // Start Tournament Timer
        function startTournamentTimer() {
            if (tournamentState.isRunning && !tournamentState.isPaused) {
                alert('Timer already running');
                return;
            }

            if (!tournamentState.isRunning) {
                tournamentState.levelStartTime = Date.now();
                tournamentState.timeRemaining = tournamentState.levelTime * 60;
            } else if (tournamentState.isPaused) {
                // Resume from pause
                const now = Date.now();
                const pausedDuration = now - tournamentState.levelStartTime;
                tournamentState.levelStartTime = now - (tournamentState.levelTime * 60 - tournamentState.timeRemaining) * 1000;
                tournamentState.isPaused = false;
            }

            tournamentState.isRunning = true;
            
            clearInterval(tournamentState.countdownInterval);
            updateCountdownDisplay();
            tournamentState.countdownInterval = setInterval(updateCountdownDisplay, 100);
            
            // Update button
            const startBtn = event.target;
            if (startBtn) {
                startBtn.textContent = '⏸ Pause';
                startBtn.onclick = pauseTournamentTimer;
            }
            
            addActivityLog(`Timer started: Level ${tournamentState.currentLevel}, ${tournamentState.levelTime}min`);
        }

        // Pause Tournament Timer
        function pauseTournamentTimer() {
            if (!tournamentState.isRunning || tournamentState.isPaused) {
                return;
            }

            tournamentState.isPaused = true;
            clearInterval(tournamentState.countdownInterval);
            
            // Update button back to Start
            const pauseBtn = event.target;
            if (pauseBtn) {
                pauseBtn.textContent = '▶ Start';
                pauseBtn.onclick = startTournamentTimer;
            }
            
            addActivityLog('Timer paused');
        }

        // Update Countdown Display
        function updateCountdownDisplay() {
            if (!tournamentState.isRunning || !tournamentState.levelStartTime) return;

            const elapsed = Math.floor((Date.now() - tournamentState.levelStartTime) / 1000);
            const remaining = Math.max(0, tournamentState.levelTime * 60 - elapsed);
            
            tournamentState.timeRemaining = remaining;

            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            document.getElementById('levelCountdown').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            if (remaining === 0) {
                clearInterval(tournamentState.countdownInterval);
                tournamentState.isRunning = false;
                tournamentState.isPaused = false;
                addActivityLog('⏰ Time\'s up! Time to advance blinds or reset.');
                
                // Reset button
                const startBtn = document.querySelector('[onclick="startTournamentTimer()"]');
                if (startBtn) {
                    startBtn.textContent = '▶ Start';
                    startBtn.onclick = startTournamentTimer;
                }
            }
        }

        // Reset Tournament Timer
        function resetTournamentTimer() {
            if (tournamentState.isRunning) {
                clearInterval(tournamentState.countdownInterval);
                tournamentState.isRunning = false;
                tournamentState.isPaused = false;
            }

            tournamentState.levelStartTime = null;
            tournamentState.timeRemaining = tournamentState.levelTime * 60;
            updateTournamentDisplay();
            
            // Reset button
            const startBtn = document.querySelector('[onclick="startTournamentTimer()"]');
            if (startBtn) {
                startBtn.textContent = '▶ Start';
                startBtn.onclick = startTournamentTimer;
            }
            
            addActivityLog('Timer reset');
        }

        function loadTournamentData() {
            // This is now handled by updateTournamentDisplay()
            updateTournamentDisplay();
        }

        // 新建游戏会话
        async function createNewSession() {
            if (!currentUser || !(currentUser.is_admin || currentUser.username.toLowerCase() === 'peng')) {
                alert('只有管理员可以创建新会话');
                return;
            }
            if (!confirm('确定要创建新的游戏会话吗？所有当前数据将被保存并重置。')) return;
            addActivityLog('创建了新的游戏会话 (请求已发送)');
            try {
                const resp = await fetch('/api/new_session', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ admin_user: currentUser.username }) });
                const data = await resp.json();
                if (data.success) {
                    addActivityLog('新会话已创建');
                    loadAllData();
                } else {
                    alert(data.message || '创建失败');
                }
            } catch (e) {
                console.error(e);
                alert('无法创建新会话');
            }
        }

        // 清空所有数据（包括用户和历史记录）
        async function resetAllData() {
            if (!currentUser || !(currentUser.is_admin || currentUser.username.toLowerCase() === 'peng')) {
                alert('只有管理员可以清空数据');
                return;
            }
            if (!confirm('⚠️ 此操作将删除所有用户账号和游戏数据，无法撤销。确定继续吗？')) return;
            if (!confirm('再次确认：删除所有数据？此操作不可恢复！')) return;
            
            try {
                const resp = await fetch('/api/reset_all', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ admin_user: currentUser.username }) 
                });
                const data = await resp.json();
                if (data.success) {
                    alert('所有数据已清空，请重新登录');
                    // Clear local session and redirect to login
                    currentUser = null;
                    document.getElementById('mainApp').classList.add('hidden');
                    document.getElementById('authModal').classList.remove('hidden');
                    document.getElementById('loginUsername').value = '';
                    document.getElementById('loginPassword').value = '';
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    alert(data.message || '清空失败');
                }
            } catch (e) {
                console.error(e);
                alert('清空数据失败');
            }
        }

        // 刷新所有数据
        function refreshAllData() {
            loadOnlineUsers();
            loadUsersForPoints();
            loadLeaderboard();
            loadTrends();
            refreshSeats();
            addActivityLog('已刷新所有数据');
        }

        // 加载所有数据
        function loadAllData() {
            loadOnlineUsers();
            loadUsersForPoints();
            loadLeaderboard();
            loadTrends();
            refreshSeats();
            loadTournamentSettings();
            loadAdminUserList();
        }



        // Avatar change modal
        function openAvatarModal() {
            const modal = document.getElementById('avatarModal');
            if (!modal) return;
            modal.classList.remove('hidden');
            loadAvatarPickerModal();
        }

        function closeAvatarModal() {
            const modal = document.getElementById('avatarModal');
            if (!modal) return;
            modal.classList.add('hidden');
        }

        async function loadAvatarPickerModal() {
            try {
                const resp = await fetch('/api/avatars');
                const data = await resp.json();
                const picker = document.getElementById('avatarPickerModal');
                picker.innerHTML = '';
                const taken = new Set(data.taken || []);
                (data.all || []).forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'w-10 h-10 text-2xl flex items-center justify-center rounded';
                    btn.textContent = emoji;
                    // allow current user's avatar
                    if (taken.has(emoji) && !(currentUser && currentUser.avatar === emoji)) {
                        btn.classList.add('opacity-40', 'cursor-not-allowed');
                        btn.disabled = true;
                    }
                    btn.addEventListener('click', () => {
                        document.getElementById('avatarPickerModalSelected').value = emoji;
                        picker.querySelectorAll('button').forEach(b => b.classList.remove('ring', 'ring-2', 'ring-blue-400'));
                        btn.classList.add('ring', 'ring-2', 'ring-blue-400');
                    });
                    picker.appendChild(btn);
                });
            } catch (e) { console.error(e); }
        }

        async function saveAvatarChange() {
            const avatar = document.getElementById('avatarPickerModalSelected').value;
            if (!avatar) { alert('请选择头像'); return; }
            const resp = await fetch('/api/update_avatar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser.username, avatar }) });
            const data = await resp.json();
            if (data.success) {
                currentUser.avatar = avatar;
                const av = document.getElementById('currentAvatar');
                if (avatar.indexOf('.') > -1) av.innerHTML = `<img src="/static/${avatar}" class="w-8 h-8 rounded-full object-cover"/>`; else av.textContent = avatar;
                closeAvatarModal();
                loadOnlineUsers();
            } else {
                alert(data.message);
            }
        }

        // Admin: open Manage Users modal
        function openManageUsers() {
            console.log('openManageUsers called', currentUser);
            if (!currentUser || !(currentUser.is_admin || currentUser.username.toLowerCase() === 'peng')) {
                alert('只有管理员可以管理用户');
                return;
            }
            const modal = document.getElementById('manageUsersModal');
            if (!modal) { console.warn('manageUsersModal not found'); return; }
            // remove hidden class and force visible styles
            modal.classList.remove('hidden');
            // ensure modal is a direct child of body to avoid stacking-context issues
            try { if (modal.parentElement !== document.body) document.body.appendChild(modal); } catch (e) { console.warn('append modal to body failed', e); }
            try {
                modal.style.display = 'flex';
                modal.style.zIndex = '9999';
                modal.style.opacity = '1';
                modal.style.visibility = 'visible';
                modal.style.pointerEvents = 'auto';
            } catch (e) { console.warn('could not set modal styles', e); }
            console.log('manage modal shown:', modal);
            loadManageUsers();
        }

        function closeManageUsers() {
            const modal = document.getElementById('manageUsersModal');
            if (!modal) return;
            modal.classList.add('hidden');
            try { modal.style.display = 'none'; modal.style.pointerEvents = 'none'; modal.style.visibility = 'hidden'; } catch (e) {}
        }

        async function loadManageUsers() {
            try {
                const resp = await fetch('/api/users_all');
                const data = await resp.json();
                console.log('manage users payload', data);
                const list = document.getElementById('manageUsersList');
                if (!list) return;
                list.innerHTML = '';
                const users = data.users || [];
                if (users.length === 0) {
                    const none = document.createElement('div');
                    none.className = 'p-3 text-sm muted';
                    none.textContent = '无用户';
                    list.appendChild(none);
                    return;
                }
                users.forEach(u => {
                    const row = document.createElement('div');
                    row.className = 'flex items-center justify-between p-2 border-b';
                    const left = document.createElement('div');
                    left.className = 'flex items-center gap-3';
                    const avatar = document.createElement('div');
                    avatar.className = 'w-8 h-8 rounded-full flex items-center justify-center';
                    avatar.textContent = u.avatar || '';
                    const name = document.createElement('div');
                    name.textContent = u.username;
                    left.appendChild(avatar);
                    left.appendChild(name);
                    row.appendChild(left);

                    const right = document.createElement('div');
                    // prevent admin from deactivating themselves
                    if (currentUser && currentUser.username === u.username) {
                        const badge = document.createElement('div');
                        badge.className = 'text-sm muted';
                        badge.textContent = '当前管理员';
                        right.appendChild(badge);
                    } else {
                        if (u.active) {
                            const btn = document.createElement('button');
                            btn.className = 'px-2 py-1 rounded bg-red-600 text-white text-sm';
                            btn.textContent = '停用';
                            btn.addEventListener('click', () => deactivateUser(u.username));
                            right.appendChild(btn);
                        } else {
                            const btn = document.createElement('button');
                            btn.className = 'px-2 py-1 rounded bg-green-600 text-white text-sm';
                            btn.textContent = '恢复';
                            btn.addEventListener('click', () => reactivateUser(u.username));
                            right.appendChild(btn);
                        }
                    }
                    row.appendChild(right);
                    list.appendChild(row);
                });
            } catch (e) {
                console.error('加载管理用户失败', e);
            }
        }

        async function reactivateUser(username) {
            if (!confirm(`确认恢复用户 ${username} 吗？`)) return;
            try {
                const resp = await fetch('/api/reactivate_user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ admin_user: currentUser.username, username }) });
                const data = await resp.json();
                if (data.success) {
                    addActivityLog(`管理员 ${currentUser.username} 恢复用户 ${username}`);
                    loadManageUsers();
                    loadOnlineUsers();
                    loadUsersForPoints();
                    loadLeaderboard();
                    refreshSeats();
                } else {
                    alert(data.message || '恢复失败');
                }
            } catch (e) {
                console.error('恢复用户失败', e);
                alert('恢复失败');
            }
        }

        async function deactivateUser(username) {
            if (!confirm(`确认停用用户 ${username} 吗？该用户将从排行榜和座位分配中移除。`)) return;
            try {
                const resp = await fetch('/api/delete_user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ admin_user: currentUser.username, username }) });
                const data = await resp.json();
                if (data.success) {
                    addActivityLog(`管理员 ${currentUser.username} 停用用户 ${username}`);
                    // refresh related UI
                    loadManageUsers();
                    loadOnlineUsers();
                    loadUsersForPoints();
                    loadLeaderboard();
                    refreshSeats();
                } else {
                    alert(data.message || '停用失败');
                }
            } catch (e) {
                console.error('停用用户失败', e);
                alert('停用失败');
            }
        }
    </script>
